<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAULT OS — Authenticating</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #02030a;
      color: #e2e8f0;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-box {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .glyph {
      font-size: 48px;
      color: #7c3aed;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #64748b;
    }
    .error { color: #ef4444; font-size: 12px; letter-spacing: 0.15em; display: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="glyph">⬡</div>
    <div class="label" id="label">AUTHENTICATING</div>
    <div class="error" id="error"></div>
  </div>
  <script type="module" src="/src/auth-callback.js"></script>
</body>
</html>
